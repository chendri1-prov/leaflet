<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kaart viewer</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map { height:100vh; width:100%; }

    #info {
      position:absolute;
      top:10px;
      right:10px;
      z-index:1000;
      background:white;
      padding:8px 12px;
      border-radius:6px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      font:13px sans-serif;
      max-width:260px;
    }

    .dot-bgt {
      background:#e63946;
      border:2px solid #fff;
      border-radius:50%;
      width:12px;
      height:12px;
    }
  </style>
</head>

<body>

<div id="map"></div>
<div id="info">Laden...</div>

<script>
/* =========================
   1. PARAMETERS UIT URL
========================= */

const params = new URLSearchParams(window.location.search);

var sx = Number(params.get("sx"));
var sy = Number(params.get("sy"));
var ex = Number(params.get("ex"));
var ey = Number(params.get("ey"));
var adres = params.get("adres") || "Onbekend adres";

/* =========================
   2. VALIDATIE
========================= */

if ([sx, sy, ex, ey].some(v => Number.isNaN(v))) {
  document.getElementById("info").innerHTML =
    "❌ Ongeldige of ontbrekende coördinaten";
  throw new Error("Invalid coordinates");
}

/* =========================
   3. MAP INIT
========================= */

var map = L.map('map').setView([52.1, 5.1], 10);

L.tileLayer(
  'https://service.pdok.nl/hwh/luchtfotorgb/wmts/v1_0/Actueel_ortho25/EPSG:3857/{z}/{x}/{y}.jpeg',
  {
    maxZoom: 22,
    attribution: '© PDOK / Kadaster'
  }
).addTo(map);

/* =========================
   4. PUNTEN MAKEN
========================= */

var p1 = L.CRS.EPSG3857.unproject(L.point(sx, sy));
var p2 = L.CRS.EPSG3857.unproject(L.point(ex, ey));

/* extra safety check */
if (!p1 || !p2) {
  document.getElementById("info").innerHTML =
    "❌ Fout bij berekenen punten";
  throw new Error("Invalid points");
}

/* =========================
   5. ICON
========================= */

var bgtIcon = L.divIcon({
  className: 'dot-bgt',
  iconSize: [12, 12],
  iconAnchor: [6, 6]
});

/* =========================
   6. MARKERS + LIJN
========================= */

L.marker(p1, {icon: bgtIcon}).addTo(map).bindPopup('BGT start');
L.marker(p2, {icon: bgtIcon}).addTo(map).bindPopup('BGT eind');

L.polyline([p1, p2], {
  color: '#e63946',
  weight: 5
}).addTo(map);

/* =========================
   7. ZOOM
========================= */

var bounds = L.latLngBounds([p1, p2]);

map.fitBounds(bounds, {
  padding: [60, 60],
  maxZoom: 22
});

/* =========================
   8. INFO BOX
========================= */

document.getElementById("info").innerHTML =
  "<b>" + adres + "</b><br>" +
  "<span style='color:#e63946'>&#9644;</span> BGT lijn";

</script>

</body>
</html>

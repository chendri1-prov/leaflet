<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kaart viewer</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map { height:100vh; width:100%; }

    #info {
      position:absolute;
      top:10px;
      right:10px;
      z-index:1000;
      background:white;
      padding:10px 12px;
      border-radius:6px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      font:13px sans-serif;
      max-width:280px;
      line-height:1.4;
    }

    /* klein startpunt */
    .dot-start {
      background:#1d3557;
      border:2px solid #fff;
      border-radius:50%;
      width:8px;
      height:8px;
    }

    /* eindpunt (groter accent) */
    .dot-end {
      background:#e63946;
      border:2px solid #fff;
      border-radius:50%;
      width:12px;
      height:12px;
    }

    /* pijltje */
    .arrow-icon {
      width:0;
      height:0;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-top:14px solid #e63946;
      transform: rotate(90deg);
    }

    .label {
      background: rgba(255,255,255,0.9);
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div id="map"></div>
<div id="info">Laden...</div>

<script>

/* =========================
   DATA
========================= */

const params = new URLSearchParams(window.location.search);

var sx = Number(params.get("sx"));
var sy = Number(params.get("sy"));
var ex = Number(params.get("ex"));
var ey = Number(params.get("ey"));

var adres = params.get("adres") || "onbekend";
var plaats = params.get("plaats") || "-";
var lengte = params.get("lengte") || "-";
var bron = params.get("bron") || "-";
var score = params.get("score") || "-";

/* safety */
if ([sx, sy, ex, ey].some(v => isNaN(v))) {
  document.getElementById("info").innerHTML =
    "❌ Ongeldige coördinaten";
  throw new Error("Invalid coords");
}

/* =========================
   MAP
========================= */

var pdok = L.tileLayer(
  'https://service.pdok.nl/brt/achtergrondkaart/wmts/v2_0/standaard/EPSG:3857/{z}/{x}/{y}.png',
  {
    maxZoom: 18,
    attribution: '© PDOK'
  }
);

var esriTopo = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
  {
    maxZoom: 19,
    attribution: '© Esri'
  }
);

var esriSat = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {
    maxZoom: 19,
    attribution: '© Esri'
}
);

/* MAP INIT */
var map = L.map('map', {
  layers: [pdok]
}).setView([52.1, 5.1], 10);

/* SWITCHER */
L.control.layers(
{
  "PDOK Topo": pdok,
  "ESRI Topo": esriTopo,
  "ESRI Satelliet": esriSat
).addTo(map);

/* =========================
   POINTS
========================= */

var p1 = L.CRS.EPSG3857.unproject(L.point(sx, sy));
var p2 = L.CRS.EPSG3857.unproject(L.point(ex, ey));

/* START (klein punt) */
var startIcon = L.divIcon({
  className: 'dot-start'
});

/* EINDE (pijltje) */
var arrowIcon = L.divIcon({
  className: 'arrow-icon'
});

/* markers */
L.marker(p1, {icon: startIcon}).addTo(map).bindPopup('Start meting');

L.marker(p2, {
  icon: arrowIcon,
  rotationAngle: 0
}).addTo(map).bindPopup('Einde meting');

/* lijn */
var line = L.polyline([p1, p2], {
  color: '#e63946',
  weight: 4
}).addTo(map);

/* =========================
   ZOOM
========================= */

map.fitBounds(L.latLngBounds([p1, p2]), {
  padding: [60, 60],
  maxZoom: 22
});

/* =========================
   INFO PANEL
========================= */

document.getElementById("info").innerHTML = "Kaart laden...";

<b>Meting</b><br><br>

<b>Adres:</b> ${adres}<br>
<b>Plaats:</b> ${plaats}<br>
<b>Lengte:</b> ${lengte} m<br>
<b>Bron:</b> ${bron}<br>
<b>Betrouwbaarheid:</b> ${score}<br>
`;

</script>

</body>
</html>
